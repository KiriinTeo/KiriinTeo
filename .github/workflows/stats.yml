name: Update GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate General Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=KiriinTeo&show_icons=true&theme=radical&count_private=false
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # count_private=false aplicado para manter a privacidade dos repositórios ocultos
          # exclude_repo e hide ativados para cortar os dados inflados
          options: username=KiriinTeo&layout=compact&langs_count=8&theme=radical&count_private=true&hide=HTML #&exclude_repo=NOME-DO-PROJETO&hide=NOME-DA-LINGUAGEM
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats" || exit 0
          git push
